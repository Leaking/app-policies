<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Policies</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafafa;
      --fg: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --panel: #ffffff;
      --accent: #0969da;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --muted: #8b949e;
        --line: #30363d;
        --panel: #161b22;
        --accent: #58a6ff;
      }
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
    }

    p {
      margin: 10px 0;
      color: var(--muted);
    }

    ul {
      margin: 24px 0 0;
      padding-left: 1.4em;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <article>
      <h1>App Policies</h1>
      <p>Privacy policy and support pages for apps published by Leaking.</p>
      <ul>
        <li><a href="./zhifan/privacy/">知饭隐私政策</a></li>
        <li><a href="./zhifan/support/">知饭支持</a></li>
      </ul>
    </article>
  </main>
</body>
</html>
