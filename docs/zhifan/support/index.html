<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>饭特西支持</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafafa;
      --fg: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --panel: #ffffff;
      --accent: #0969da;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --muted: #8b949e;
        --line: #30363d;
        --panel: #161b22;
        --accent: #58a6ff;
      }
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
    }

    p {
      margin: 10px 0;
    }

    .meta {
      color: var(--muted);
      margin-bottom: 24px;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <article>
      <h1>饭特西支持</h1>
      <p class="meta">Support for Fan / 饭特西</p>
      <p>如果你在使用饭特西时遇到问题，或需要反馈隐私、内容、登录、发布、图片保存等相关问题，请发送邮件至 <a href="mailto:chenhuazhaoao@gmail.com">chenhuazhaoao@gmail.com</a>。</p>
      <p>饭特西是非官方饭否客户端。饭否账号、饭否服务可用性、饭否内容本身的问题需要以饭否服务状态为准。</p>
      <p><a href="../privacy/">查看隐私政策</a></p>
    </article>
  </main>
</body>
</html>
